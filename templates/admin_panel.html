
{% extends "base.html" %}
{% import "_window.html" as window %}

{% block content %}
    <dialog x-ref="dialog">
        <h1>Detail chatu</h1>
        <p><strong>Jméno:</strong> <span x-text="selectedSession.fname + ' ' + selectedSession.lname"></span></p>
        <p><strong>Třída:</strong> <span x-text="selectedSession.class_name"></span></p>
        <p><strong>Správné heslo:</strong> <span x-text="selectedSession.password"></span></p>
        <p><b>Historie:</b></p>
        <ul>
            <template x-for="message in selectedSession.history">
                <li :class="message.type === 'sent' ? 'sent' : 'received'">
                    <span x-text="message.text"></span>
                </li>
            </template>
        </ul>
        <button @click="closeDialog()">Zavřít</button>
    </dialog>

    {% call window.window("Admin Panel", "admin-window") %}
        <h1>Admin Panel</h1>
        <ul class="sessions">
            <template x-for="session in sessions">
                <li class="session">
                    <p><strong>ID:</strong> <span x-text="session.id"></span></p>
                    <p><strong>Jméno:</strong> <span x-text="session.fname + ' ' + session.lname"></span></p>
                    <p><strong>Třída:</strong> <span x-text="session.class_name"></span></p>
                    <button @click="deleteSession(session)">Smazat</button>
                    <button @click="viewDetail(session)">Detail</button>
                </li>
            </template>
        </ul>
    {% endcall %}
{% endblock %}

{% block scripts %}
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('container', () => ({
                sessions: [],
                selectedSession: {},
                interval: null,

                init() {
                    axios.get('/admin/sessions')
                        .then(response => {
                            console.log(response.data.sessions[2]);
                            this.sessions = response.data.sessions;
                        })
                        .catch(err => {
                            alert('Chyba při načítání session: ' + err);
                        });
                },

                deleteSession(session) {
                    if (!confirm('Opravdu chcete smazat tuto session?')) return;
                    const id = session.id;

                    axios.delete(`/admin/session/${id}`)
                        .then(() => {
                            this.sessions = this.sessions.filter(s => s.id !== id);
                        })
                        .catch(err => {
                            alert('Chyba při mazání session: ' + err);
                        });
                },

                viewDetail(session) {
                    let id = session.id;
                    axios.get(`/admin/session/${id}`)
                        .then(response => {
                            this.selectedSession = response.data.session;
                            this.$refs.dialog.showModal();
                            this.interval = setInterval(() => {
                                axios.get(`/admin/session/${id}`)
                                    .then(response => {
                                        this.selectedSession = response.data.session;
                                    })
                                    .catch(err => {
                                        alert('Chyba při načítání detailu session: ' + err);
                                    });
                            }, 5000);
                        })
                        .catch(err => {
                            alert('Chyba při načítání detailu session: ' + err);
                        });
                },

                closeDialog() {
                    this.$refs.dialog.close();
                    clearInterval(this.interval);
                }
            }))
        })
    </script>
{% endblock %}
