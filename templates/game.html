
{% extends "base.html" %}
{% import "_window.html" as window %}

{% block content %}
    {% call window.window("Chat", "chat-window") %}
        <div class="chat-header">
            <div class="profile">
                <div class="profile-picture"></div>
                <p>Jana Nováková</p>
            </div>
        </div>

        <div class="chat-body">
            <div class="chat-messages">
                <template x-for="(msg, index) in messages.slice().reverse()" :key="index">
                    <div class="message" :class="msg.type === 'sent' ? 'sent' : 'received'">
                        <p x-text="msg.text"></p>
                    </div>
                </template>
            </div>
            <div class="chat-input">
                <div class="typing-indicator" x-show="typing">
                    <div class="dot" style="animation-delay: 0.0s;">•</div>
                    <div class="dot" style="animation-delay: 0.2s;">•</div>
                    <div class="dot" style="animation-delay: 0.4s;">•</div>
                </div>

                <input type="text" placeholder="Napiš zprávu..." x-model="message" @keydown.enter="sendMessage">
                <button class="send-button" @click="sendMessage" x-ref="sendButton">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    {% endcall %}

    {% call window.window("Facebook", "password-window") %}
        <div class="fb-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="f">
        </div>
        <div class="login-form">
            <input type="text" x-model="email" placeholder="Email" readonly>
            <input type="password" x-model="password" placeholder="Heslo" autocomplete="off">
            <button class="login-button" @click="tryLogin">Přihlásit se</button>
        </div>
    {% endcall %}
{% endblock %}

{% block scripts %}
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('container', () => ({
                messages: JSON.parse('{{ session.get_history()|tojson|safe }}'),
                message: '',
                email: 'jnovakova@gmail.com',
                password: '',
                canSend: true,
                typing: false,

                sendMessage() {
                    if (!this.canSend || this.message.trim() === '') return;
                    console.log('Odeslaná zpráva:', this.message);
                    this.canSend = false;
                    this.messages.push({ text: this.message, type: 'sent' });

                    setTimeout(() => {this.typing = true;}, 500);

                    axios.post('/message', { message: this.message })
                        .then(response => {
                            console.log('Odpověď serveru:', response.data);
                            this.messages.push({ text: response.data.response, type: 'received' });
                            this.canSend = true;
                            this.typing = false;
                        }).catch(error => {
                            if (error.response && error.response.status === 400) {
                                window.location.assign('/new_game');
                            }
                        });
                    this.message = '';
                },

                tryLogin() {
                    console.log(this.password);
                    axios.post('/password', { password: this.password })
                        .then(response => {
                            console.log('Odpověď serveru:', response.data);
                            if (response.data.correct) {
                                alert('Gratulujeme! Získali jste heslo!');
                                window.location.assign('/leaderboard');
                            } else {
                                alert('Špatné heslo, zkuste to znovu.');
                            }
                        })
                        .catch(error => {
                            if (error.response && error.response.status === 400) {
                                window.location.assign('/new_game');
                            }
                        });
                }
            }));
        });
    </script>
{% endblock %}
